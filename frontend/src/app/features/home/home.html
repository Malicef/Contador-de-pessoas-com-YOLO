<section class="home">

  </header>

  <div class="home__cards">
    <article class="home-card">
      <span class="home-card__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M23 7l-7 5 7 5V7z" />
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
        </svg>
      </span>
      <h2 class="home-card__title">Contagem ao Vivo</h2>
      <p class="home-card__text">
        Utilize a câmera do dispositivo para monitoramento em tempo real.
      </p>
      <a class="btn btn--primary" routerLink="/live">Abrir câmera</a>
    </article>

    <article class="home-card">
      <span class="home-card__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path d="M21 15l-5-5L5 21" />
        </svg>
      </span>
      <h2 class="home-card__title">Upload de Arquivo</h2>
      <p class="home-card__text">Envie fotos ou vídeos para análise.</p>
      <a class="btn btn--primary" routerLink="/upload">Selecionar arquivo</a>
    </article>
  </div>
